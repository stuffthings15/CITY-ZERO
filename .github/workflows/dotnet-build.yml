name: CITY//ZERO — .NET Build & Test

# Builds the game C# project and runs all unit tests.
# No Godot engine required — tests use GodotStubs.cs.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build + Test (.NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        dotnet: [ "10.0.x" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      # ── Game project ──────────────────────────────────────────────────────────
      # CityZero.Game.csproj uses Godot.NET.Sdk — restore to verify dependency graph
      - name: Restore game project
        run: dotnet restore CityZero.Game.csproj

      # ── Test project ──────────────────────────────────────────────────────────
      - name: Restore test project
        run: dotnet restore CityZero.Tests.csproj

      - name: Build test project
        run: dotnet build CityZero.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test CityZero.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=results-${{ matrix.os }}.trx"
          --verbosity normal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: "**/*.trx"

      # ── Data validation ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON data
        run: |
          pip install jsonschema --quiet
          python scripts/validate_data.py
