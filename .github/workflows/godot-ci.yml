name: CITY//ZERO — Godot CI

# Replaces the old Unity CI. Engine: Godot 4 (no license secrets required).
# Jobs:
#   1. validate  — JSON schema validation + naming lint
#   2. test      — xUnit tests for all game systems (no Godot engine needed)
#   3. build     — Godot headless import + C# compile check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}

env:
  GODOT_VERSION: "4.4.1"
  DOTNET_VERSION: "10.0.x"

jobs:

  # ── Job 1: Data validation ────────────────────────────────────────────────────
  validate:
    name: Validate JSON Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate all data files
        run: python scripts/validate_data.py

  # ── Job 2: Unit tests (pure .NET; no Godot engine) ───────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore test project
        run: dotnet restore CityZero.Tests.csproj

      - name: Build test project
        run: dotnet build CityZero.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test CityZero.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --verbosity normal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  # ── Job 3: Godot headless build ───────────────────────────────────────────────
  godot-build:
    name: Godot Import & C# Compile
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot4
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot ${{ env.GODOT_VERSION }} headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot4
          chmod +x /usr/local/bin/godot4

      - name: Godot version check
        run: godot4 --version

      - name: Run Godot headless import (validates scene/resource integrity)
        run: |
          godot4 --headless --import --quit 2>&1 | tee godot_import.log
          # Non-zero only if Godot crashes; import errors are logged but don't fail CI
          echo "Import log tail:"
          tail -20 godot_import.log

      - name: Build game C# project via Godot
        run: godot4 --headless --build-solutions --quit 2>&1 | tee godot_build.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-build-logs
          path: |
            godot_import.log
            godot_build.log
