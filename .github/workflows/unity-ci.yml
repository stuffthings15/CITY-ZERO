name: Unity - CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unity-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Library (optional)
        uses: actions/cache@v4
        with:
          path: |
            Library
            Packages
          key: ${{ runner.os }}-unity-${{ hashFiles('Packages/manifest.json') }}

      - name: Unity Builder
        uses: game-ci/unity-builder@v2
        with:
          # Set the Unity version in repository secrets or the workflow variables below
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneWindows64
          buildName: CityZero_Windows
          buildMethod: BuildScript.PerformBuild
          customParameters: -quit -batchmode -nographics
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-build
          path: build/

# Notes:
# 1) This workflow assumes a Unity build method BuildScript.PerformBuild exists in your Unity project that the builder will call.
# 2) Set repository secrets: UNITY_EMAIL, UNITY_PASSWORD, UNITY_SERIAL (or use a license file approach supported by the unity-builder action).
# 3) Optionally set an environment variable UNITY_VERSION in repository or replace with a concrete version string (e.g., "6.0.0f1").
# 4) The builder action requires internet access to activate Unity; consider using a Unity license file for automated CI.
